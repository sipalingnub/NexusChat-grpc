syntax = "proto3";

package auth;
option go_package = "nexuschat/proto/auth";

service AuthService {
  rpc Register (AuthRequest) returns (AuthResponse);
  rpc Login (AuthRequest) returns (AuthResponse);
}

message AuthRequest {
  string username = 1;
  string password = 2;
}

message AuthResponse {
  bool success = 1;
  string message = 2;
  string token = 3; // JWT Token
}