syntax = "proto3";

package coremessaging;
option go_package = "nexuschat/proto/coremessaging";

service MessagingService {
  // Bi-directional streaming untuk chat real-time
  rpc ChatStream (stream ChatMessage) returns (stream ChatMessage);
  
  // Unary untuk melaporkan pesan sudah dibaca (Message Acknowledgement)
  rpc AckMessage (AckRequest) returns (AckResponse);
}

message ChatMessage {
  string message_id = 1;
  string sender_id = 2;
  string receiver_id = 3;
  string content = 4;
  int64 timestamp = 5;
}

message AckRequest {
  string message_id = 1;
  string receiver_id = 2;
}

message AckResponse {
  bool success = 1;
  string status = 2; // "DELIVERED"
}