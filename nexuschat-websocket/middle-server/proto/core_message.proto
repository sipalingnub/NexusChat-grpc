syntax = "proto3";

package coremessaging;

service MessagingService {
  rpc ChatStream (stream ChatMessage) returns (stream ChatMessage);
  rpc AckMessage (AckRequest) returns (AckResponse);
}

message ChatMessage {
  string message_id = 1;
  string sender_id = 2;
  string receiver_id = 3;
  string content = 4;
  int64 timestamp = 5;
}

message AckRequest {
  string message_id = 1;
  string receiver_id = 2;
}

message AckResponse {
  bool success = 1;
  string status = 2;
}